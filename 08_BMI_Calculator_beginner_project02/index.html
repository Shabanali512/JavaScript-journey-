<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../08_BMI_Calculator_beginner_project02/style.css">
    <script src="../08_BMI_Calculator_beginner_project02/script.js" defer ></script>
    

    <title>BMI Calculator</title>
</head>
<body>
    <nav>
        <a href="#" aria-current="page" >Home</a>
    </nav>
    
    <div class="container">
        <h1>BMI Calculator</h1>

        <form>
            <div class="input-group">
                <label for="height">Height (cm):</label>
                <input type="number" id="height" placeholder="Enter your height">
            </div>

            <div class="input-group">
                <label for="weight">Weight (kg):</label>
                <input type="number" id="weight" placeholder="Enter your weight">
            </div>

            <button type="submit" id="calculate">Calculate BMI</button>

            <div id="results"></div>
            <div id="weight_guide">

                <h3>BMI Weight Guide</h3>
                <p>Under Weight = Less than 18.5</p>
                <p>Normal Weight = 18.5 - 24.9</p>
                <p>Over Weight = 25 - 29.9</p>
                <p>Obese = 30 or more</p>
            </div>
        </form>
    </div>
</body>
</html>
